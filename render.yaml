services:
  - type: web
    name: Pegasusxz-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: Pegasusxz_CORS_ORIGINS
        sync: false
      - key: Pegasusxz_MAX_UPLOAD_BYTES
        value: "8388608"
      - key: Pegasusxz_MAX_BATCH_IMAGES
        value: "10"
      - key: Pegasusxz_MAX_STREAM_FRAME_BYTES
        value: "3145728"
